<div class="jsonEditor">
  <div class="controls">

    <button class="jsonFormat" type="button" title="Format JSON"><i class="bi bi-code"></i></button>
  </div>
  <textarea id="${detail.getId()}" class="form-control" rows="4" data-maxheight="300">$!{value}</textarea>
  <div class="jsonErrorMessage">&nbsp;</div>
</div>
