#set( $frontendid = $context.getRequestParameter("id"))
#set( $data = $searcherManager.getData("system","frontend",$frontendid))
<h3>Add Site</h3>
			
			<form name="adder" action="$home$apphome/views/sites/addsitefinish.html">
				<input name="frontendid" value="${data.id}" type="hidden"/>
				<input name="deploypath" value="$appcatalog.rootpath/$data.id" type="hidden"/>

				<div class="app-info-content">
					<p><strong>$data.longdescription</strong>						
					</p>
				</div>		
						
				<div class="app-info-content" style="max-width:500px;">
					<p>
				Label:<br>
				<input name="sitename" value="$data.name" size="30"  class="form-control" />
				<p>
				<p>
				Folder path:<br>
				<input name="rootpath"  size="30" value="/mynewsite" class="form-control" /> 
				</p>
				<p>
				Catalog ID: (optional)<br>
				<input name="sitecatalogid"  size="30" class="form-control" /> <i> i.e. mystuff/catalog</i>
				</p>

				<p><input type="submit" class="btn btn-primary install-app" value="Save" /></p>

				</div>				


			
			</form>
